spring.application.name=countries-api
server.port=8080

# Logging
logging.level.root=INFO
logging.level.com.countries=INFO

# REST Countries API URL
rest-countries.api.url=https://restcountries.com/v3.1/all?fields=name,capital,region,population,flags

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:3001
spring.web.cors.allowed-methods=GET,POST,OPTIONS
spring.web.cors.allow-credentials=true
